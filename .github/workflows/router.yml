name: Overnight Lead Router (READ-ONLY)

# This job ONLY reads leads and writes an Excel decision log to /logs.
# It contains no Zoho write/update calls — it cannot modify a lead.

on:
  workflow_dispatch: {}              # manual "Run workflow" button (use this to test today)
  repository_dispatch:
    types: [run-router]              # cron-job.org fires this at 5:30am PT
  schedule:
    - cron: "30 12 * * *"            # 12:30 UTC = 5:30am PDT — BACKUP only (GitHub cron is best-effort)

permissions:
  contents: write                    # needed only to commit the log file back to the repo

concurrency:
  group: router
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests openpyxl

      - name: Run router (read-only — Excel out only)
        env:
          ZOHO_DC:            com
          ZOHO_CLIENT_ID:     ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
        run: |
          D=$(TZ=America/Los_Angeles date +%F)
          mkdir -p logs
          python overnight_router.py --days 90 --out "logs/backfill_90d.xlsx"

      - name: Commit the log
        run: |
          D=$(TZ=America/Los_Angeles date +%F)
          git config user.name  "router-bot"
          git config user.email "router-bot@users.noreply.github.com"
          git add logs/*.xlsx || true
          git commit -m "Decision log ${D}" || echo "no changes to commit"
          git pull --rebase --autostash || true
          git push

      - name: Also upload as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: decision-log
          path: logs/
