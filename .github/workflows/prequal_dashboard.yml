name: PreQual Funnel Dashboard

# Drives generate_report.py (now the underwriting-velocity dashboard).
# Reuses the existing repo secrets, so no new refresh token is needed.

on:
  schedule:
    # Hourly, 8am-6pm PT, Mon-Fri (more frequent runs = tighter S2/S3 snapshots).
    # Dial back to once a day if you prefer: '0 15 * * 1-5'
    - cron: '0 15-23 * * 1-5'
    - cron: '0 0-1 * * 2-6'
  workflow_dispatch:

permissions:
  contents: write          # lets the UDW snapshot state get committed back

jobs:
  prequal-funnel-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate and upload dashboard
        env:
          ZOHO_CLIENT_ID:     ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
          TIINY_API_KEY:      ${{ secrets.TIINY_API_KEY }}
        run: python "Prequal dashboard.py"      # quoted because of the space in the filename

      - name: Persist UDW snapshot state
        run: |
          if [[ -n "$(git status --porcelain udw_snapshot_state.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add udw_snapshot_state.json
            git commit -m "Update UDW snapshot state [skip ci]"
            git push
          else
            echo "No snapshot change this run."
          fi
