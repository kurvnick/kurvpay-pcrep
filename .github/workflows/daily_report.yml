name: PC In-Day Activity Report

# NOTE: same workflow name + filename as before, so your cron-job.org
# workflow_dispatch trigger keeps working unchanged. Same repo secrets.

on:
  schedule:
    # Every 30 min, 8am-6pm PT (unchanged from the old In-Day report).
    - cron: '0,30 15-23 * * 1-5'
    - cron: '0,30 0-1 * * 2-6'
  workflow_dispatch:

permissions:
  contents: write          # needed so the snapshot state can be committed back

jobs:
  generate-inday-report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate and upload dashboard
        env:
          ZOHO_CLIENT_ID:     ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
          TIINY_API_KEY:      ${{ secrets.TIINY_API_KEY }}
        run: python generate_inday_report.py

      - name: Persist UDW snapshot state
        run: |
          if [[ -n "$(git status --porcelain udw_snapshot_state.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add udw_snapshot_state.json
            git commit -m "Update UDW snapshot state [skip ci]"
            git push
          else
            echo "No snapshot change this run."
          fi
